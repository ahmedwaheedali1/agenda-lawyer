name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool
        pip install buildozer cython

    - name: Setup Android SDK (المسار الصحيح لـ Buildozer)
      run: |
        # Buildozer يتوقع SDK في هذا المسار
        SDK_PATH="/home/runner/.buildozer/android/platform/android-sdk"
        mkdir -p $SDK_PATH
        cd $SDK_PATH
        
        # تحميل أدوات سطر الأوامر
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        
        # تهيئة المجلدات بشكل صحيح
        mkdir -p cmdline-tools
        mv cmdline-tools cmdline-tools/latest
        
        # قبول التراخيص
        yes | cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
        
        # تثبيت المكونات المطلوبة
        cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.0"
        cmdline-tools/latest/bin/sdkmanager "platforms;android-33"
        cmdline-tools/latest/bin/sdkmanager "platform-tools"
        
        echo "✅ تم تثبيت Android SDK بنجاح"

    - name: Build APK
      run: |
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app
        path: bin/*.apk
