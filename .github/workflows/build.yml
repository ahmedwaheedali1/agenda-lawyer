name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool
        pip install buildozer cython

    - name: Setup Android SDK
      run: |
        # تحميل Android SDK في المكان اللي بيدور فيه Buildozer
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk
        cd /home/runner/.buildozer/android/platform/android-sdk
        
        # تحميل command line tools
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-linux-11076708_latest.zip
        
        # إنشاء المجلد بالشكل المطلوب
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* cmdline-tools/latest/
        
        # قبول التراخيص
        yes | cmdline-tools/latest/bin/sdkmanager --licenses || true
        
        # تثبيت build-tools والمنصات
        cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.0"
        cmdline-tools/latest/bin/sdkmanager "platforms;android-33"
        
        # تثبيت platform-tools
        cmdline-tools/latest/bin/sdkmanager "platform-tools"
        
        # تحديد المتغيرات
        echo "ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=/home/runner/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV

    - name: Build APK
      run: |
        # تأكيد وجود SDK
        ls -la /home/runner/.buildozer/android/platform/android-sdk/
        ls -la /home/runner/.buildozer/android/platform/android-sdk/build-tools/
        
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app
        path: bin/*.apk
